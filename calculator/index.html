<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Harrison Moss">

    <title>JavaScript Calculator</title>

    <!-- jQuery + Validation -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.1/dist/jquery.validate.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.1/dist/additional-methods.min.js"></script>

    <style>
        .error {
            color: red;
            padding-left: 5px;
            display: block;
        }
    </style>
</head>

<body>

<h1>JavaScript Calculator</h1>

<form id="calculatorForm">

    <label for="operand1">Operand 1:</label>
    <input type="number" id="operand1" name="operand1">
    <br><br>

    <label>Operator:</label>
    <input type="radio" name="rdoperator" value="+"> +
    <input type="radio" name="rdoperator" value="-"> -
    <input type="radio" name="rdoperator" value="*"> *
    <input type="radio" name="rdoperator" value="/"> /
    <br><br>

    <label for="operand2">Operand 2:</label>
    <input type="number" id="operand2" name="operand2">
    <br><br>

    <label for="result">Result:</label>
    <input type="text" id="result" readonly>
    <br><br>

    <button type="submit">Calculate</button>
    <button type="button" id="clearBtn">Clear</button>

</form>

<script>
$(document).ready(function () {

    $("#calculatorForm").validate({

        rules: {
            operand1: {
                required: true,
                number: true
            },
            operand2: {
                required: true,
                number: true
            },
            rdoperator: {
                required: true
            }
        },

        messages: {
            operand1: {
                required: "Operand 1 is required",
                number: "Operand 1 must be a valid number"
            },
            operand2: {
                required: "Operand 2 is required",
                number: "Operand 2 must be a valid number"
            },
            rdoperator: {
                required: "Operator is required"
            }
        },

        errorPlacement: function(error, element) {
            if (element.attr("name") === "rdoperator") {
                error.insertAfter(element.closest("label"));
            } else {
                error.insertAfter(element);
            }
        },

        submitHandler: function (form) {

            const operand1 = parseFloat($("#operand1").val());
            const operand2 = parseFloat($("#operand2").val());
            const operator = $("input[name='rdoperator']:checked").val();

            if (operator === "/" && operand2 === 0) {
                alert("Cannot divide by zero");
                return false;
            }

            let result;

            switch (operator) {
                case "+":
                    result = operand1 + operand2;
                    break;
                case "-":
                    result = operand1 - operand2;
                    break;
                case "*":
                    result = operand1 * operand2;
                    break;
                case "/":
                    result = operand1 / operand2;
                    break;
            }

            $("#result").val(result);
        }

    });

    $("#clearBtn").click(function () {
        $("#calculatorForm")[0].reset();
        $("#result").val("");
        $(".error").remove();
    });

});
</script>

</body>
</html>
